<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue AJAX Assignment</title>

    <script src="https://unpkg.com/vue@3"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

<h1>Video Games</h1>


    <p v-if="loading">Loading data...</p>
    <p v-if="error">{{ error }}</p>

    <ul>
 <li 
    v-for="item in items" 
    :key="item.id" 
    @click="getDetails(item.id)"
>
  {{ item.title }} ({{ item.platform }})
</li>
    </ul>

  <div v-if="selectedItem" class="details">
   <h2>{{ selectedItem.title }}</h2>
   <p>{{ selectedItem.description }}</p>
   <p><strong>Platform:</strong> {{ selectedItem.platform }}</p>
    <p><strong>Rating:</strong> {{ selectedItem.rating }}</p>

  <p v-if="selectedItem.genre">
    <strong>Genre:</strong> {{ selectedItem.genre.name }}
  </p>
</div>
</div>


<!-- JS connection  -->

<script src="js/main.js"></script>

</body>
</html>
